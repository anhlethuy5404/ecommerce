worker_processes auto;
events {
    worker_connections 1024;
}
http {
    upstream product_service {
        server product-service:8001;
    }

    upstream catalog_service {
        server catalog-service:8002;
    }

    upstream user_service {
        server user-service:8003;
    }

    upstream order_service {
        server order-service:8004;
    }

    upstream payment_service {
        server payment-service:8005;
    }

    upstream shipping_service {
        server shipping-service:8006;
    }

    upstream cart_service {
        server cart-service:8007;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 8000;
        server_name localhost;

        # Product service proxy
        location /products/ {
            proxy_pass http://product_service/api/products/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Catalog service proxy
        location /categories/ {
            proxy_pass http://catalog_service/api/categories/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /catalog/ {
            proxy_pass http://catalog_service/api/categories/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User service proxy
        location /users/ {
            proxy_pass http://user_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Order service proxy
        location /orders/ {
            proxy_pass http://order_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Payment service proxy
        location /payments/ {
            proxy_pass http://payment_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Shipping service proxy
        location /shipping/ {
            proxy_pass http://shipping_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cart service proxy
        location /cart/ {
            proxy_pass http://cart_service/api/cart/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
